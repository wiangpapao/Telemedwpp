<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <base target="_top">
      <style>
         body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
         iframe {
            position: absolute;
            top: -28px; /* ดันหน้าจอขึ้น 28px เพื่อซ่อนแถบ Google */
            left: 0;
            width: 100%;
            height: calc(100% + 28px); /* ชดเชยความสูงที่ดันขึ้นไป */
            border: 0;
         }
      </style>
   </head>
   <body>
      <iframe src="https://script.google.com/macros/s/AKfycbx2z7XDdBX0kIFU1td6nNSHg8wsgKuK7aZHppwuyx3XOXPN7TBb0PbU1DP2HxnVMQYsPA/exec"></iframe>
   </body>
</html>
